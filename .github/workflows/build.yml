name: Build leodm.jar

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout leodanmu
        uses: actions/checkout@v4

      - name: Checkout GoProxyAndroid
        uses: actions/checkout@v4
        with:
          repository: leotvgo/GoProxyAndroid
          path: go-proxy-android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Generate leodm.jar (Go + smali)
        run: |
          export GO_SOURCE_DIR="$GITHUB_WORKSPACE/go-proxy-android"
          export NDK_ROOT="$ANDROID_NDK_HOME"
          bash jar/danmu.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leodm-jar
          path: |
            jar/leodm.jar
            jar/leodm.jar.md5
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            自动构建
            Commit: ${{ github.sha }}
          files: |
            jar/leodm.jar
            jar/leodm.jar.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
