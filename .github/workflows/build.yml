name: Build leodm.jar

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Generate leodm.jar
        run: |
          cd jar
          rm -f leodm.jar
          rm -rf Smali_classes

          APK_PATH="../app/build/outputs/apk/release/app-release-unsigned.apk"
          APKTOOL_PATH="3rd/apktool_2.11.0.jar"

          echo "反编译 APK..."
          java -jar "$APKTOOL_PATH" d -f --only-main-classes "$APK_PATH" -o Smali_classes

          rm -rf spider.jar/smali/com/github/catvod/spider
          rm -rf spider.jar/smali/com/github/catvod/js
          rm -rf spider.jar/smali/com/github/catvod/net
          rm -rf spider.jar/smali/org/slf4j

          mkdir -p spider.jar/smali/com/github/catvod/
          mkdir -p spider.jar/smali/org/slf4j/

          [ -d "Smali_classes/smali/com/github/catvod/spider" ] && mv Smali_classes/smali/com/github/catvod/spider spider.jar/smali/com/github/catvod/
          [ -d "Smali_classes/smali/com/github/catvod/js" ]     && mv Smali_classes/smali/com/github/catvod/js     spider.jar/smali/com/github/catvod/
          [ -d "Smali_classes/smali/com/github/catvod/net" ]    && mv Smali_classes/smali/com/github/catvod/net    spider.jar/smali/com/github/catvod/
          [ -d "Smali_classes/smali/org/slf4j" ]                && mv Smali_classes/smali/org/slf4j                spider.jar/smali/org/

          rm -rf spider.jar/assets

          echo "重新打包..."
          java -jar "$APKTOOL_PATH" b spider.jar -c

          mv spider.jar/dist/dex.jar leodm.jar
          md5sum leodm.jar | awk '{print $1}' > leodm.jar.md5

          rm -rf spider.jar/build spider.jar/smali spider.jar/dist Smali_classes

          echo "leodm.jar 生成成功"
          ls -lh leodm.jar
          echo "MD5: $(cat leodm.jar.md5)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: leodm-jar
          path: |
            jar/leodm.jar
            jar/leodm.jar.md5
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build #${{ github.run_number }}"
          body: |
            自动构建
            Commit: ${{ github.sha }}
          files: |
            jar/leodm.jar
            jar/leodm.jar.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
